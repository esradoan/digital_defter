name: Deploy Frontend

on:
  # Sadece manuel tetikleme için. Otomatik çalışma (push vb.) kaldırıldı.
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          # Build sırasında API adresini koda gömer.
          # Vite projelerinde VITE_ ile başlaması şarttır.
          VITE_API_URL: https://api.labyonetimi.com/api

      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/labmanager-frontend"
          strip_components: 2